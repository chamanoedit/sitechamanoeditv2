<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Envie seu Edit — CHAMANOEDIT</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0A0A0C;
      --card:  #111114;
      --border:#222228;
      --fire:  #FF4500;
      --fire2: #FF8C00;
      --cream: #F5ECD7;
      --smoke: #9A9AA8;
      --ink:   #0A0A0C;
    }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .wrap { position: relative; z-index: 1; width: 100%; max-width: 520px; }

    .header {
      display: flex; flex-direction: column; align-items: center;
      gap: 1rem; margin-bottom: 2.5rem; text-align: center;
    }
    .header img { width: 56px; height: 56px; }
    .header h1 {
      font-family: 'Anton', sans-serif;
      font-size: 2rem; letter-spacing: .04em; text-transform: uppercase;
      background: linear-gradient(135deg, var(--fire2), var(--fire));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header p { color: var(--smoke); font-size: .9rem; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 2rem;
    }

    .field { margin-bottom: 1.25rem; }
    label {
      display: block; font-size: .78rem; font-weight: 600;
      color: var(--smoke); text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: .5rem;
    }
    input[type="text"], input[type="number"] {
      width: 100%; background: #18181C; border: 1px solid var(--border);
      border-radius: .65rem; color: var(--cream); font-size: .95rem;
      padding: .75rem 1rem; outline: none; transition: border-color .2s;
      font-family: inherit;
    }
    input[type="text"]:focus, input[type="number"]:focus { border-color: var(--fire); }
    input[type="text"]::placeholder, input[type="number"]::placeholder { color: #444; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .dropzone {
      border: 2px dashed var(--border);
      border-radius: .85rem; padding: 2rem 1rem;
      text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .dropzone:hover, .dropzone.over { border-color: var(--fire); background: #18181C; }
    .dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .dz-icon { font-size: 2rem; margin-bottom: .5rem; }
    .dz-label { font-size: .9rem; color: var(--smoke); }
    .dz-label strong { color: var(--cream); }
    .dz-hint { font-size: .75rem; color: #555; margin-top: .35rem; }
    .dz-name {
      display: none; margin-top: .75rem;
      background: #18181C; border-radius: .5rem; padding: .5rem .75rem;
      font-size: .82rem; color: var(--cream); word-break: break-all;
    }

    .progress-wrap { display: none; margin-top: 1.25rem; }
    .progress-bar { height: 8px; border-radius: 99px; background: var(--border); overflow: hidden; }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--fire2), var(--fire));
      transition: width .2s;
    }
    .progress-label { font-size: .8rem; color: var(--smoke); margin-top: .5rem; text-align: center; }

    .btn {
      width: 100%; margin-top: 1.75rem;
      padding: .95rem; border-radius: .85rem; border: none; cursor: pointer;
      font-family: 'Anton', sans-serif; font-size: 1.1rem; letter-spacing: .06em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--fire2), var(--fire));
      color: var(--ink);
      transition: opacity .2s, transform .1s;
    }
    .btn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .success, .error-msg {
      display: none; margin-top: 1.25rem;
      border-radius: .85rem; padding: 1.25rem;
      text-align: center; font-size: .92rem; line-height: 1.5;
    }
    .success   { background: #0f2e1a; border: 1px solid #1e5c33; color: #4ade80; }
    .error-msg { background: #2e0f0f; border: 1px solid #5c1e1e; color: #f87171; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    .section-title {
      font-size: .7rem; font-weight: 600; letter-spacing: .12em;
      text-transform: uppercase; color: var(--smoke); margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="header">
      <img src="assets/logo-chama.png" alt="CHAMANOEDIT" />
      <h1>Envie seu Edit</h1>
      <p>Área exclusiva para alunos — compartilhe seu trabalho com a gente 🔥</p>
    </div>

    <div class="card">

      <p class="section-title">Seus dados</p>

      <div class="field">
        <label>Seu @ do Instagram</label>
        <input type="text" id="ig_aluno" placeholder="@seuperfil" />
      </div>
      <div class="field">
        <label>@ do cliente / igreja editada</label>
        <input type="text" id="ig_cliente" placeholder="@igrejaxyz" />
      </div>

      <hr class="divider" />
      <p class="section-title">Métricas do edit</p>

      <div class="row">
        <div class="field" style="margin:0">
          <label>Views</label>
          <input type="number" id="views" placeholder="ex: 45000" min="0" />
        </div>
        <div class="field" style="margin:0">
          <label>Likes</label>
          <input type="number" id="likes" placeholder="ex: 2300" min="0" />
        </div>
      </div>

      <hr class="divider" />
      <p class="section-title">Vídeo do edit</p>

      <div class="dropzone" id="dropzone">
        <input type="file" id="video_file" accept="video/*" />
        <div class="dz-icon">🎬</div>
        <div class="dz-label"><strong>Arraste o vídeo aqui</strong> ou clique para selecionar</div>
        <div class="dz-hint">MP4, MOV ou similar · máximo 200 MB</div>
        <div class="dz-name" id="dz_name"></div>
      </div>

      <div class="progress-wrap" id="progress_wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress_fill"></div></div>
        <div class="progress-label" id="progress_label">Preparando…</div>
      </div>

      <button class="btn" id="submit_btn" onclick="enviar()">Enviar edit</button>

      <div class="success" id="success_box"></div>
      <div class="error-msg" id="error_box"></div>

    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwwd3v7m2gOHcmeqQIIicCtYXT6De4-JRWv_1SNIXSTG1fozJWJrU4Zt0sWhJcKz4TM/exec';
    const CHUNK_SIZE = 5 * 1024 * 1024; // 5 MB por chunk
    const MAX_MB = 200;

    // --- Drag & drop ---
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('video_file');

    fileInput.addEventListener('change', () => showFile(fileInput.files[0]));
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault(); dropzone.classList.remove('over');
      const f = e.dataTransfer.files[0];
      if (f) { fileInput.files = e.dataTransfer.files; showFile(f); }
    });

    function showFile(f) {
      if (!f) return;
      const dz = document.getElementById('dz_name');
      dz.style.display = 'block';
      dz.textContent = `📎 ${f.name}  (${(f.size / 1024 / 1024).toFixed(1)} MB)`;
    }

    function val(id) { return document.getElementById(id).value.trim(); }

    function setProgress(pct, label) {
      document.getElementById('progress_fill').style.width = pct + '%';
      document.getElementById('progress_label').textContent = label;
    }

    async function enviar() {
      const ig_aluno   = val('ig_aluno');
      const ig_cliente = val('ig_cliente');
      const views      = val('views');
      const likes      = val('likes');
      const file       = fileInput.files[0];

      hideMessages();

      if (!ig_aluno || !ig_cliente || !views || !likes || !file) {
        return showError('Preencha todos os campos e selecione o vídeo antes de enviar.');
      }
      if (file.size > MAX_MB * 1024 * 1024) {
        return showError(`Arquivo muito grande (${(file.size/1024/1024).toFixed(0)} MB). Máximo: ${MAX_MB} MB.`);
      }

      const btn = document.getElementById('submit_btn');
      btn.disabled = true;
      document.getElementById('progress_wrap').style.display = 'block';
      setProgress(2, 'Iniciando upload…');

      try {
        // 1. Criar sessão de upload resumível no Drive via Apps Script
        const initRes = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'init',
            ig_aluno, ig_cliente,
            views: parseInt(views), likes: parseInt(likes),
            fileName: file.name,
            mimeType: file.type || 'video/mp4',
            fileSize: file.size
          })
        });
        const init = await initRes.json();
        if (!init.ok) throw new Error(init.error || 'Falha ao iniciar upload.');

        const { uploadUrl, fileName } = init;

        // 2. Upload em chunks direto ao Drive
        setProgress(5, 'Enviando vídeo para o Drive…');
        const fileId = await uploadChunked(file, uploadUrl, (pct) => {
          setProgress(5 + pct * 0.88, `Enviando… ${Math.round(pct)}%`);
        });

        // 3. Registrar na planilha
        setProgress(96, 'Registrando dados…');
        await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'log',
            ig_aluno, ig_cliente,
            views: parseInt(views), likes: parseInt(likes),
            fileName,
            fileUrl: fileId ? `https://drive.google.com/file/d/${fileId}/view` : ''
          })
        });

        setProgress(100, 'Concluído!');
        setTimeout(() => {
          document.getElementById('progress_wrap').style.display = 'none';
        }, 800);

        showSuccess(`Edit enviado com sucesso, ${ig_aluno}! 🔥<br>A equipe CHAMANOEDIT vai analisar em breve.`);
        resetForm();

      } catch (err) {
        document.getElementById('progress_wrap').style.display = 'none';
        showError('Algo deu errado: ' + err.message + '. Tente novamente ou fale com a equipe.');
      } finally {
        btn.disabled = false;
      }
    }

    async function uploadChunked(file, uploadUrl, onProgress) {
      let offset = 0;
      let fileId = null;
      const total = file.size;

      while (offset < total) {
        const end   = Math.min(offset + CHUNK_SIZE - 1, total - 1);
        const chunk = file.slice(offset, end + 1);

        const res = await fetch(uploadUrl, {
          method: 'PUT',
          headers: {
            'Content-Range': `bytes ${offset}-${end}/${total}`,
            'Content-Type': file.type || 'video/mp4'
          },
          body: chunk
        });

        if (res.status === 200 || res.status === 201) {
          const json = await res.json().catch(() => ({}));
          fileId = json.id || null;
          onProgress(100);
          break;
        } else if (res.status === 308) {
          // Resume Incomplete — avança pelo Range retornado
          const range = res.headers.get('Range');
          offset = range ? parseInt(range.split('-')[1]) + 1 : end + 1;
          onProgress(offset / total * 100);
        } else {
          const body = await res.text().catch(() => res.status);
          throw new Error(`Erro no upload (${res.status}): ${body}`);
        }
      }

      return fileId;
    }

    function resetForm() {
      ['ig_aluno','ig_cliente','views','likes'].forEach(id => document.getElementById(id).value = '');
      fileInput.value = '';
      document.getElementById('dz_name').style.display = 'none';
    }

    function hideMessages() {
      document.getElementById('success_box').style.display = 'none';
      document.getElementById('error_box').style.display   = 'none';
    }
    function showSuccess(html) {
      const el = document.getElementById('success_box');
      el.innerHTML = html; el.style.display = 'block';
    }
    function showError(msg) {
      const el = document.getElementById('error_box');
      el.textContent = msg; el.style.display = 'block';
    }
  </script>
</body>
</html>
